<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="ecgFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BE5A" stop-opacity="0"/>
      <stop offset="8%" stop-color="#00BE5A" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00BE5A" stop-opacity="0.6"/>
      <stop offset="92%" stop-color="#00BE5A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00BE5A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#00BE5A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00BE5A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Five sensor color dots gradient -->
    <linearGradient id="sensorLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e682e6"/>
      <stop offset="25%" stop-color="#00BE5A"/>
      <stop offset="50%" stop-color="#32c8ff"/>
      <stop offset="75%" stop-color="#ffc800"/>
      <stop offset="100%" stop-color="#1482ff"/>
    </linearGradient>
  </defs>

  <!-- Void -->
  <rect width="1280" height="320" fill="#000000"/>

  <!-- Subtle atmosphere -->
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- ECG Trace — realistic PQRST waveform -->
  <!-- Ghost glow layer -->
  <path d="M 0 175 L 80 175 L 100 175 L 110 172 L 118 178 L 122 170 L 128 175
    Q 135 175 145 173 L 150 178 L 152 120 L 156 195 L 160 170 L 165 175
    Q 175 175 190 172 L 200 175
    L 280 175 L 300 175 L 310 172 L 318 178 L 322 170 L 328 175
    Q 335 175 345 173 L 350 178 L 352 115 L 356 198 L 360 168 L 365 175
    Q 375 175 390 172 L 400 175
    L 480 175 L 500 175 L 510 172 L 518 178 L 522 170 L 528 175
    Q 535 175 545 173 L 550 178 L 552 108 L 556 200 L 560 165 L 565 175
    Q 575 175 590 172 L 600 175
    L 680 175 L 700 175 L 710 172 L 718 178 L 722 170 L 728 175
    Q 735 175 745 173 L 750 178 L 752 118 L 756 196 L 760 170 L 765 175
    Q 775 175 790 172 L 800 175
    L 880 175 L 900 175 L 910 172 L 918 178 L 922 170 L 928 175
    Q 935 175 945 173 L 950 178 L 952 112 L 956 198 L 960 168 L 965 175
    Q 975 175 990 172 L 1000 175
    L 1080 175 L 1100 175 L 1110 172 L 1118 178 L 1122 170 L 1128 175
    Q 1135 175 1145 173 L 1150 178 L 1152 120 L 1156 195 L 1160 170 L 1165 175
    Q 1175 175 1190 172 L 1200 175 L 1280 175"
    fill="none" stroke="url(#ecgFade)" stroke-width="6" opacity="0.08" filter="url(#blur)"/>

  <!-- Main trace -->
  <path d="M 0 175 L 80 175 L 100 175 L 110 172 L 118 178 L 122 170 L 128 175
    Q 135 175 145 173 L 150 178 L 152 120 L 156 195 L 160 170 L 165 175
    Q 175 175 190 172 L 200 175
    L 280 175 L 300 175 L 310 172 L 318 178 L 322 170 L 328 175
    Q 335 175 345 173 L 350 178 L 352 115 L 356 198 L 360 168 L 365 175
    Q 375 175 390 172 L 400 175
    L 480 175 L 500 175 L 510 172 L 518 178 L 522 170 L 528 175
    Q 535 175 545 173 L 550 178 L 552 108 L 556 200 L 560 165 L 565 175
    Q 575 175 590 172 L 600 175
    L 680 175 L 700 175 L 710 172 L 718 178 L 722 170 L 728 175
    Q 735 175 745 173 L 750 178 L 752 118 L 756 196 L 760 170 L 765 175
    Q 775 175 790 172 L 800 175
    L 880 175 L 900 175 L 910 172 L 918 178 L 922 170 L 928 175
    Q 935 175 945 173 L 950 178 L 952 112 L 956 198 L 960 168 L 965 175
    Q 975 175 990 172 L 1000 175
    L 1080 175 L 1100 175 L 1110 172 L 1118 178 L 1122 170 L 1128 175
    Q 1135 175 1145 173 L 1150 178 L 1152 120 L 1156 195 L 1160 170 L 1165 175
    Q 1175 175 1190 172 L 1200 175 L 1280 175"
    fill="none" stroke="url(#ecgFade)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Five sensor color dots — positioned along the baseline -->
  <circle cx="350" cy="260" r="3" fill="#e682e6" opacity="0.5"/>
  <circle cx="480" cy="260" r="3" fill="#00BE5A" opacity="0.5"/>
  <circle cx="610" cy="260" r="3" fill="#32c8ff" opacity="0.5"/>
  <circle cx="740" cy="260" r="3" fill="#ffc800" opacity="0.5"/>
  <circle cx="870" cy="260" r="3" fill="#1482ff" opacity="0.5"/>

  <!-- Thin five-color line connecting the dots -->
  <line x1="350" y1="260" x2="870" y2="260" stroke="url(#sensorLine)" stroke-width="0.8" opacity="0.25"/>

  <!-- Green dot — the character -->
  <circle cx="640" cy="175" r="4" fill="#00BE5A" opacity="0.7"/>
  <circle cx="640" cy="175" r="8" fill="#00BE5A" opacity="0.08"/>
</svg>
